name: 市场播报

on:
  schedule:
    # 港股开盘后 北京时间 09:35（UTC 01:35）周一至周五
    - cron: '35 1 * * 1-5'
    # 美股收盘后 北京时间次日凌晨 05:00（UTC 前一天 21:00）周一至周五
    - cron: '0 21 * * 1-5'
  workflow_dispatch:   # 手动触发按钮

jobs:
  broadcast:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run market broadcast
        env:
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          LARK_SIGN_SECRET: ${{ secrets.LARK_SIGN_SECRET }}
        run: python market_broadcast.py
