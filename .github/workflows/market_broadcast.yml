name: 市场播报

on:
  schedule:
    - cron: '35 1 * * 1-5'
    - cron: '0 21 * * 1-5'
  workflow_dispatch:

jobs:
  broadcast:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write        # 允许 push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run market broadcast
        env:
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          LARK_SIGN_SECRET: ${{ secrets.LARK_SIGN_SECRET }}
        run: python market_broadcast.py

      - name: Keep repo active
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          echo "Last run: $(date -u '+%Y-%m-%d %H:%M UTC')" > last_run.txt
          git add last_run.txt
          git commit -m "chore: keep alive" || echo "no changes"
          git push
